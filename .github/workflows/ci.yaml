name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    container: registry.fedoraproject.org/fedora:latest
    steps:
      - name: Install deps
        run: dnf install -y gcc make cargo golang cbindgen pkg-config openssl-devel

      - uses: actions/checkout@v4

      - name: Clone and install arapuca
        run: |
          git clone --depth 1 https://github.com/sergio-correia/arapuca.git /tmp/arapuca
          cd /tmp/arapuca
          make install PREFIX=/usr/local

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Test
        run: CGO_ENABLED=1 go test -v ./...

      - name: Vet
        run: CGO_ENABLED=1 go vet ./...

      - name: Format check
        run: |
          gofmt -l . | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out

      - name: Module tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod
